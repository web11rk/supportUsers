<!DOCTYPE html>
<html>
<head>
    <title>Orange Support - Admin Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #d946ef 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 480px;
            width: 100%;
        }
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo img {
            height: 50px;
            width: auto;
        }
        h1 { 
            color: #7c3aed; 
            margin-bottom: 10px; 
            text-align: center; 
            font-size: 24px;
            font-weight: 600;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #8b5cf6;
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: #16a349;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn:hover {
            background: #138a3d;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(22, 163, 73, 0.4);
        }
        .error {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #c33;
            font-size: 14px;
        }
        .password-toggle {
            position: relative;
        }
        .toggle-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #999;
            user-select: none;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: #8b5cf6;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }
        .back-link a:hover {
            color: #6366f1;
        }
        .security-note {
            background: linear-gradient(135deg, #f3e8ff 0%, #ede9fe 100%);
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
            font-size: 13px;
            color: #555;
        }
        .security-note strong {
            color: #7c3aed;
        }
        .logo-badge {
            margin-right: 15px;
            font-weight: 700;
            color: #1f2937;
            font-size: 20px;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">

            <span class="logo-badge">
                ORANGE
            </span>
        </div>
        <h1>🔐 Admin Access</h1>
        <p class="subtitle">Support Team Dashboard</p>

        {% if error %}
        <div class="error">
            ⚠️ {{ error }}
        </div>
        {% endif %}

        <form action="/login" method="POST">
            <div class="form-group">
                <label for="email">📧 Email Address</label>
                <input type="email" id="email" name="email" placeholder="admin@gmail.co" required autofocus>
            </div>

            <div class="form-group">
                <label for="password">🔒 Password</label>
                <div class="password-toggle">
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    <span class="toggle-icon" onclick="togglePassword()">👁️</span>
                </div>
            </div>

            <button type="submit" class="btn">
                🚀 Access Dashboard
            </button>
        </form>

        <div class="security-note">
            <strong>🔒 Secure Access:</strong> This is a protected area for authorized support staff only.
        </div>

        <div class="back-link">
            <a href="/">← Back to Support</a>
        </div>
    </div>

    <script>
        function togglePassword() {
            const passwordField = document.getElementById('password');
            const toggleIcon = document.querySelector('.toggle-icon');
            
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                toggleIcon.textContent = '🙈';
            } else {
                passwordField.type = 'password';
                toggleIcon.textContent = '👁️';
            }
        }
    </script>
</body>
</html>
